<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Packages</title>

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    background: #333;
    color: white;
}

.nav-links {
    display: flex;
    list-style: none;
}

.nav-links li {
    margin-left: 20px;
}

.nav-links a {
    color: white;
    text-decoration: none;
}

/* SECTION */
.packages {
    text-align: center;
    padding: 50px 20px;
    background: #f5f6fa;
}

.packages h2 {
    margin-bottom: 30px;
    font-size: 32px;
    color: #2f3640;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    width: 85%;
    margin: auto;
}

.card {
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card h3 {
    margin-bottom: 10px;
    color: #0a3d62;
}

.card p {
    font-size: 18px;
    color: #27ae60;
    font-weight: bold;
}

.card:hover {
    transform: translateY(-5px);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: #333;
    color: #fff;
    margin-top: 40px;
}

</style>

</head>

<body>

<header>
<nav class="navbar">
<h1 class="logo">TravelGo</h1>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="destinations.html">Destinations</a></li>
<li><a href="packages.html">Packages</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>
</header>

<section class="packages" data-aos="fade-up">
<h2>Travel Packages</h2>

<div class="cards">
<div class="card"><h3>Goa</h3><p>₹10,000</p></div>
<div class="card"><h3>Dubai</h3><p>₹50,000</p></div>
<div class="card"><h3>Paris</h3><p>₹80,000</p></div>
<div class="card"><h3>Maldives</h3><p>₹70,000</p></div>
<div class="card"><h3>Manali</h3><p>₹15,000</p></div>
<div class="card"><h3>Kashmir</h3><p>₹25,000</p></div>
<div class="card"><h3>Bali</h3><p>₹60,000</p></div>
</div>

</section>

<footer>
<p>© 2026 TravelGo</p>
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
